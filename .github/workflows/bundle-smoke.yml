name: Bundle Smoke

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bundle-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            artifact_name: bundle-smoke-linux
            source_glob: target/release/bundle/appimage/*.AppImage
            sig_glob: target/release/bundle/appimage/*.AppImage.sig
          - os: windows-latest
            platform: windows
            artifact_name: bundle-smoke-windows
            source_glob: target/release/bundle/nsis/*.exe
            sig_glob: target/release/bundle/nsis/*.exe.sig
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Resolve version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./apps/desktop/package.json').version")"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Build Tauri bundle
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run build

      - name: Stage release-shaped artifact
        id: stage
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.value }}
          PLATFORM: ${{ matrix.platform }}
          SOURCE_GLOB: ${{ matrix.source_glob }}
          SIG_GLOB: ${{ matrix.sig_glob }}
        run: |
          shopt -s nullglob
          files=($SOURCE_GLOB)
          signatures=($SIG_GLOB)
          if [[ "${#files[@]}" -ne 1 ]]; then
            echo "expected exactly one bundle artifact, found ${#files[@]}" >&2
            printf '%s\n' "${files[@]}"
            exit 1
          fi

          if [[ "${#signatures[@]}" -ne 1 ]]; then
            echo "expected exactly one updater signature, found ${#signatures[@]}" >&2
            printf '%s\n' "${signatures[@]}"
            exit 1
          fi

          mkdir -p release-assets
          if [[ "$PLATFORM" == "linux" ]]; then
            asset_name="key-b0x_${VERSION}_linux_x86_64.AppImage"
            sig_name="key-b0x_${VERSION}_linux_x86_64.AppImage.sig"
          else
            asset_name="key-b0x_${VERSION}_windows_x64-setup.exe"
            sig_name="key-b0x_${VERSION}_windows_x64-setup.exe.sig"
          fi

          cp "${files[0]}" "release-assets/$asset_name"
          cp "${signatures[0]}" "release-assets/$sig_name"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error
